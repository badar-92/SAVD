<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAVD 2026 — Team Roster</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --wash-1:#eef9fb; --wash-2:#d3edf2; --panel:#ffffff; --line:#c6e6ec;
  --ink:#0a3540; --ink-soft:#3f6b76; --coral:#f05b30; --coral-deep:#c43d1a; --teal-pop:#0e8a95;
  --font-display:'Orbitron','Arial Narrow',sans-serif;
  --font-body:'Rajdhani','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; width:100vw; height:100vh; overflow:hidden;
  background:linear-gradient(180deg,var(--wash-1),var(--wash-2)); font-family:var(--font-body); color:var(--ink); }

#bg-slideshow{ position:fixed; inset:0; z-index:0; overflow:hidden; }
.bg-slide{
  position:absolute; inset:0; background-size:cover; background-position:center;
  opacity:0; transform:scale(1.12); transition:opacity 3.2s ease-in-out, transform 11s linear;
  filter:saturate(.9) brightness(1.08);
}
.bg-slide.active{ opacity:.7; transform:scale(1); z-index:1; }

#bg-video{
  position:fixed; inset:0; z-index:0; overflow:hidden;
}
#bg-video video{
  position:absolute; top:50%; left:50%; width:100%; height:100%; object-fit:cover;
  transform:translate(-50%,-50%); filter:saturate(.9) brightness(1.08); opacity:.7;
}

#bg-overlay{
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,.1) 0%, rgba(219,242,245,.18) 70%, rgba(197,232,237,.3) 100%);
}

.team-scene{
  background:rgba(255,255,255,.58); backdrop-filter:blur(14px) saturate(1.15); -webkit-backdrop-filter:blur(14px) saturate(1.15);
  border:1px solid rgba(255,255,255,.6); border-radius:24px; padding:2.4vh 2vw;
  box-shadow:0 24px 60px rgba(10,53,64,.16); width:97vw; max-width:1800px;
}

#backLink{
  position:fixed; top:22px; left:28px; z-index:20; font-family:var(--font-mono); font-size:17px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--coral-deep); text-decoration:none; border:1px solid rgba(196,61,26,.35);
  border-radius:999px; padding:8px 18px; background:rgba(255,255,255,.7);
}
#backLink:hover{ background:rgba(240,91,48,.1); }

#audioToggle{
  position:fixed; top:70px; left:28px; z-index:20; pointer-events:auto;
  display:flex; align-items:center; gap:8px;
  font-family:var(--font-mono); font-size:15px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink); background:rgba(255,255,255,.72); backdrop-filter:blur(8px);
  border:1px solid rgba(198,230,236,.9); border-radius:999px; padding:9px 16px 9px 12px;
  cursor:pointer; box-shadow:0 6px 18px rgba(10,53,64,.1);
  transition:background .2s ease, transform .2s ease, box-shadow .2s ease;
}
#audioToggle:hover{ background:rgba(255,255,255,.92); transform:translateY(-2px); }
#audioToggle:active{ transform:translateY(0); }
#audioToggle[aria-pressed="true"]{ color:var(--teal-pop); border-color:rgba(14,138,149,.4); background:rgba(14,138,149,.08); }
#audioToggle svg{ flex:none; }

#counter{
  position:fixed; top:22px; right:28px; z-index:20; font-family:var(--font-mono); font-size:17px; letter-spacing:.2em;
  color:var(--ink-soft);
}

#hint{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:20;
  font-family:var(--font-mono); font-size:17px; letter-spacing:.1em; color:var(--ink-soft);
  background:rgba(255,255,255,.7); border:1px solid var(--line); border-radius:999px; padding:8px 20px;
}
#hint b{ color:var(--coral-deep); }

#eventTitle{
  position:fixed; top:22px; left:50%; transform:translateX(-50%); z-index:20;
  font-family:var(--font-display); font-weight:700; text-transform:uppercase;
  font-size:clamp(13px,1.5vw,19px); letter-spacing:.1em; color:var(--ink);
  background:rgba(255,255,255,.72); border:1px solid var(--line); border-radius:999px;
  padding:9px 26px; text-align:center; white-space:nowrap;
  box-shadow:0 6px 18px rgba(10,53,64,.1);
}
#eventTitle span{ color:var(--coral-deep); }

#stage{ position:fixed; inset:0; z-index:3; display:flex; align-items:center; justify-content:center; }
.scene{
  position:absolute; inset:0; display:flex !important; flex-direction:column; align-items:center; justify-content:center;
  opacity:0; transform:scale(1.04) translateY(14px); filter:blur(8px);
  transition:opacity .8s cubic-bezier(.4,0,.2,1), transform .8s cubic-bezier(.4,0,.2,1), filter .8s cubic-bezier(.4,0,.2,1);
  padding:1.5vh 1.5vw; text-align:center;
}
.scene.active{ opacity:1; transform:scale(1) translateY(0); filter:blur(0); }
.scene.leaving{ opacity:0; transform:scale(.97) translateY(-10px); filter:blur(6px); transition:opacity .6s ease, transform .6s ease, filter .6s ease; }

.team-scene{ display:flex; flex-direction:column; align-items:center; gap:0; width:100%; }
.uni-badge{ display:flex; align-items:center; gap:18px; opacity:0; animation:badgeIn .7s ease both; animation-delay:.05s; }
.uni-badge img{ height:clamp(78px,7.5vw,130px); width:auto; max-width:260px; object-fit:contain; }
.uni-badge .uni-name{ font-family:var(--font-mono); font-size:clamp(21px,2.18vw,32px); letter-spacing:.1em; text-transform:uppercase; color:var(--teal-pop); max-width:min(74vw,680px); text-align:left; line-height:1.4; }
.team-name-row{
  display:flex; align-items:center; justify-content:center; gap:20px;
  margin:12px 0 8px; min-height:clamp(78px,7.5vw,130px);
}
.team-name-row img.team-logo{
  height:clamp(78px,7.5vw,130px); width:clamp(78px,7.5vw,130px); object-fit:contain;
  opacity:0; transform:scale(0); will-change:transform,opacity;
}
.team-name{ font-family:var(--font-display); font-weight:700; text-transform:uppercase; font-size:clamp(43px,7.63vw,101px); margin:0; color:var(--ink); }
.team-name.team-name-long{ font-size:clamp(30px,5.6vw,72px); }
.char-in{ display:inline-block; opacity:0; animation:charPop .22s ease forwards; }
@keyframes charPop{ from{ opacity:0; transform:translateY(8px) scale(.6); } to{ opacity:1; transform:translateY(0) scale(1); } }

.crew-row{ display:flex; align-items:flex-end; justify-content:center; gap:clamp(12px,3vw,46px); margin-top:1vh; }
.crew-slot{ display:flex; flex-direction:column; align-items:center; gap:14px; }
.porthole{
  position:relative; border-radius:50%;
  background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.9), rgba(211,238,242,.7) 70%);
  border:6px solid #ffffff; box-shadow:0 0 0 3px rgba(240,91,48,.5), 0 10px 24px rgba(10,53,64,.16);
  overflow:hidden;
  animation:glowPulse 4s ease-in-out infinite;
}
.porthole img{ width:100%; height:100%; object-fit:cover; display:block; }
.porthole.big{ width:clamp(180px,16vw,260px); height:clamp(180px,16vw,260px); border-width:8px; }
.porthole.small{ width:clamp(112px,10vw,168px); height:clamp(112px,10vw,168px); }
@keyframes glowPulse{ 0%,100%{ box-shadow:0 0 0 3px rgba(240,91,48,.5), 0 10px 24px rgba(10,53,64,.16); } 50%{ box-shadow:0 0 0 3px rgba(240,91,48,.8), 0 10px 30px rgba(10,53,64,.22); } }

.crew-slot.leader .porthole{ opacity:0; animation:none; }
.crew-slot.leader .porthole.roll-left{ animation:rollFromLeft 1.05s cubic-bezier(.2,.7,.25,1) both, glowPulse 4s ease-in-out infinite 1.15s; animation-delay:.35s, 1.4s; }
.crew-slot.leader .porthole.roll-right{ animation:rollFromRight 1.05s cubic-bezier(.2,.7,.25,1) both, glowPulse 4s ease-in-out infinite 1.15s; animation-delay:.35s, 1.4s; }
.ping{ position:absolute; inset:-6px; border-radius:50%; border:2px solid var(--coral-deep); opacity:0; animation:ping 1.3s ease-out both; animation-delay:1.45s; pointer-events:none; }
.crew-slot.side .porthole{ opacity:0; animation:emerge .6s cubic-bezier(.2,.8,.2,1) both, glowPulse 4s ease-in-out infinite .9s; }
.crew-slot.side.pos-l1 .porthole{ animation-delay:.5s, 1.1s; } .crew-slot.side.pos-r1 .porthole{ animation-delay:.6s, 1.2s; }
.crew-slot.side.pos-l2 .porthole{ animation-delay:.7s, 1.3s; } .crew-slot.side.pos-r2 .porthole{ animation-delay:.8s, 1.4s; }
.tag{
  font-family:var(--font-mono); font-size:clamp(17px,1.57vw,22px); text-align:center; line-height:1.3;
  opacity:0; animation:tagIn .5s ease both; background:#ffffff; border:1px solid var(--line);
  border-radius:8px; padding:6px 12px; white-space:nowrap; color:var(--ink);
}
.tag.lead{ color:var(--coral-deep); border-color:rgba(196,61,26,.4); font-weight:700; }
.crew-slot.leader .tag{ animation-delay:.5s; }
.crew-slot.side.pos-l1 .tag{ animation-delay:.65s; } .crew-slot.side.pos-r1 .tag{ animation-delay:.75s; }
.crew-slot.side.pos-l2 .tag{ animation-delay:.85s; } .crew-slot.side.pos-r2 .tag{ animation-delay:.95s; }
.team-index-tag{ margin-top:3vh; font-family:var(--font-mono); font-size:clamp(15px,1.37vw,19px); letter-spacing:.3em; color:var(--teal-pop); opacity:0; animation:tagIn .6s ease both; animation-delay:1s; }

/* Crew members stay frozen at their pre-animation frame until the logo has
   popped in, jiggled, and the team name has finished typing out — then
   .crew-ready is added and they play their existing entrance choreography. */
.team-scene:not(.crew-ready) .crew-row *{ animation-play-state:paused !important; }
.team-scene:not(.crew-ready) .team-index-tag{ animation-play-state:paused !important; }

@keyframes badgeIn{ from{ opacity:0; transform:translateY(-24px) scale(.9); } to{ opacity:1; transform:none; } }
@keyframes teamNameIn{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:none; } }
@keyframes tagIn{ from{ opacity:0; transform:translateY(12px); } to{ opacity:1; transform:none; } }
@keyframes emerge{ 0%{ opacity:0; transform:scale(.5) translateY(14px); } 65%{ opacity:1; } 100%{ opacity:1; transform:scale(1) translateY(0); } }
@keyframes rollFromLeft{ 0%{ opacity:0; transform:translateX(-46vw) rotate(-620deg) scale(.6); } 70%{ opacity:1; } 100%{ opacity:1; transform:translateX(0) rotate(0deg) scale(1); } }
@keyframes rollFromRight{ 0%{ opacity:0; transform:translateX(46vw) rotate(620deg) scale(.6); } 70%{ opacity:1; } 100%{ opacity:1; transform:translateX(0) rotate(0deg) scale(1); } }
@keyframes ping{ 0%{ opacity:.9; transform:scale(.6); } 100%{ opacity:0; transform:scale(2.6); } }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
}
</style>

const PALETTE = ["#f05b30","#0e8a95","#c43d1a","#3f6b76","#e2461f","#0b6b74","#d94e22"];
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i)) >>> 0; } return h; }
function initialsOf(name){ return name.split(" ").filter(Boolean).map(w=>w[0]).join("").slice(0,2).toUpperCase(); }
function avatarDataUri(name){
  const hue = PALETTE[hashStr(name) % PALETTE.length];
  const initials = initialsOf(name);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><defs><radialGradient id="g" cx="35%" cy="30%"><stop offset="0%" stop-color="${hue}" stop-opacity=".9"/><stop offset="100%" stop-color="#eef9fb" stop-opacity=".95"/></radialGradient></defs><rect width="300" height="300" fill="url(#g)"/><text x="150" y="172" font-family="Arial,Helvetica,sans-serif" font-size="108" font-weight="700" fill="#ffffff" text-anchor="middle">${initials}</text></svg>`;
  return "data:image/svg+xml;base64," + btoa(svg);
}
function memberImgTag(name, filename){
  const fallback = avatarDataUri(name);
  return `<img src="${filename}" alt="${name}" onerror="this.onerror=null;this.src='${fallback}';">`;
}

function logoOrBadge(uni){ return UNIVERSITY_LOGO_MAP[uni.trim()] || ""; }

};
function displayUni(uni){ return UNIVERSITY_DISPLAY_MAP[uni.trim()] || uni; }
function el(tag, cls, html){ const e=document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; }

function buildTeam(team, index){
  const wrap = el('div','scene-inner team-scene');
  const rollDir = index % 2 === 0 ? 'roll-left' : 'roll-right';
  const member = (m, img, posClass) => `<div class="crew-slot side ${posClass}"><div class="porthole small">${memberImgTag(m, img)}</div><div class="tag">${m}</div></div>`;
  const teamNameClass = team.teamName === 'Autonomous engineers' ? 'team-name team-name-long' : 'team-name';
  wrap.innerHTML = `
    <div class="uni-badge"><img src="${logoOrBadge(team.university)}" alt="${team.university}"><div class="uni-name">${displayUni(team.university)}</div></div>
    <div class="team-name-row"><img class="team-logo" src="${team.logo}" alt="${team.teamName} logo" onerror="this.onerror=null;this.src='default.png';"><div class="${teamNameClass}"><span class="type-target"></span></div></div>
    <div class="crew-row">
      ${member(team.members[0], team.memberImgs[0], 'pos-l2')} ${member(team.members[1], team.memberImgs[1], 'pos-l1')}
      <div class="crew-slot leader"><div class="porthole big ${rollDir}">${memberImgTag(team.leader, team.leaderImg)}<span class="ping"></span></div><div class="tag lead">${team.leader} — Team Lead</div></div>
      ${member(team.members[2], team.memberImgs[2], 'pos-r1')} ${member(team.members[3], team.memberImgs[3], 'pos-r2')}
    </div>
    <div class="team-index-tag">TEAM ${String(index+1).padStart(2,'0')} / ${TEAMS.length}</div>`;
  return wrap;
}

let idx = 0;
const stage = document.getElementById('stage');
const counter = document.getElementById('counter');

function playTeamIntro(holder, teamName){
  const logo = holder.querySelector('.team-logo');
  const typeTarget = holder.querySelector('.type-target');
  const scene = holder.querySelector('.team-scene');
  if(!logo || !typeTarget || !scene) return;

  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduceMotion){
    logo.style.opacity = '1'; logo.style.transform = 'none';
    typeTarget.textContent = teamName;
    scene.classList.add('crew-ready');
    return;
  }

  const startTyping = () => {
    let i = 0;
    const perChar = 55;
    (function typeStep(){
      if(i >= teamName.length){
        setTimeout(() => scene.classList.add('crew-ready'), 300);
        return;
      }
      const ch = teamName[i];
      const span = document.createElement('span');
      span.className = 'char-in';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      typeTarget.appendChild(span);
      i++;
      setTimeout(typeStep, perChar);
    })();
  };

  // Logo is born at the dead center of the screen at zero size. It grows
  // slowly, overshooting past its real size, holds there for a beat like
  // it's materializing — then as it travels up to its real spot in the
  // team-name row, it shrinks back down to its normal size at the same
  // time, landing exactly right-sized. Only once it has landed does it
  // jiggle in place exactly as before, right before the name starts
  // typing itself out letter by letter.
  const rect = logo.getBoundingClientRect();
  const targetCenterX = rect.left + rect.width / 2;
  const targetCenterY = rect.top + rect.height / 2;
  const dx = (window.innerWidth / 2) - targetCenterX;
  const dy = (window.innerHeight / 2) - targetCenterY;
  const at = (tx, ty, s, r) => `translate(${tx}px, ${ty}px) scale(${s}) rotate(${r}deg)`;

  const pop = logo.animate([
    { transform: at(dx, dy, 0,    0), opacity:0, offset:0    }, // born at screen center, invisible
    { transform: at(dx, dy, 0.3,  0), opacity:1, offset:0.12 }, // slow growth begins
    { transform: at(dx, dy, 0.7,  0), opacity:1, offset:0.26 },
    { transform: at(dx, dy, 1.7,  0), opacity:1, offset:0.40 }, // overshoots past real size
    { transform: at(dx, dy, 1.7,  0), opacity:1, offset:0.75 }, // pause, held at center
    { transform: at(0,  0,  1,    0), opacity:1, offset:0.78 }, // travels up while shrinking to normal size
    { transform: at(0,  0,  1,   -7), opacity:1, offset:0.85 }, // jiggle, in place
    { transform: at(0,  0,  1,    7), opacity:1, offset:0.90 },
    { transform: at(0,  0,  1,   -5), opacity:1, offset:0.94 },
    { transform: at(0,  0,  1,    3), opacity:1, offset:0.97 },
    { transform: at(0,  0,  1,    0), opacity:1, offset:1    }
  ], { duration: 2800, easing: 'cubic-bezier(.3,.7,.3,1)', fill: 'forwards' });
  pop.onfinish = startTyping;
}

function mount(i){
  idx = ((i % TEAMS.length) + TEAMS.length) % TEAMS.length;
  const holder = el('div','scene'); holder.appendChild(buildTeam(TEAMS[idx], idx));
  const prev = stage.querySelector('.scene');
  if(prev){ prev.classList.remove('active'); prev.classList.add('leaving'); setTimeout(()=>{ if(prev.parentNode) prev.parentNode.removeChild(prev); }, 650); }
  stage.appendChild(holder);
  requestAnimationFrame(()=>requestAnimationFrame(()=>holder.classList.add('active')));
  setTimeout(()=>playTeamIntro(holder, TEAMS[idx].teamName), 250);
  counter.textContent = `TEAM ${idx+1} OF ${TEAMS.length}`;
}

/* Manual navigation only — no autoplay. Right arrow shows the next team. */
window.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') mount(idx+1);
  else if(e.key === 'ArrowLeft') mount(idx-1);
  else if(e.key === 'f' || e.key === 'F') toggleFullscreen();
});

/* ---- Fullscreen: toggle with F, and carry the fullscreen state across
   navigation to/from the ceremony page so the show never drops out of it. */
const FS_KEY = 'savdFullscreenActive';
function toggleFullscreen(){ !document.fullscreenElement ? document.documentElement.requestFullscreen?.() : document.exitFullscreen?.(); }
function markFullscreenForNav(){
  try{
    if(document.fullscreenElement) sessionStorage.setItem(FS_KEY,'1');
    else sessionStorage.removeItem(FS_KEY);
  }catch(e){}
}
(function resumeFullscreenIfNeeded(){
  let wasFs = false;
  try{ wasFs = sessionStorage.getItem(FS_KEY) === '1'; }catch(e){}
  if(!wasFs) return;
  const tryFs = () => { document.documentElement.requestFullscreen?.().catch(()=>{}); };
  tryFs();
  document.addEventListener('click', function once(){ tryFs(); document.removeEventListener('click', once); }, { once:true });
})();
document.querySelectorAll('a[href="opening_ceremony.html"]').forEach(a => a.addEventListener('click', markFullscreenForNav));

/* ---------- BACKGROUND AUDIO (submarine.mp4 soundtrack) ---------- */
(function initBgAudio(){
  const video = document.getElementById('bgVideoTeams');
  const btn = document.getElementById('audioToggle');
  const iconMuted = document.getElementById('iconMuted');
  const iconUnmuted = document.getElementById('iconUnmuted');
  const label = document.getElementById('audioToggleLabel');
  if(!video || !btn) return;

  function reflectState(){
    const on = !video.muted;
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    btn.setAttribute('aria-label', on ? 'Mute background audio' : 'Unmute background audio');
    label.textContent = on ? 'Sound On' : 'Sound Off';
    iconMuted.style.display = on ? 'none' : '';
    iconUnmuted.style.display = on ? '' : 'none';
  }

  video.muted = true;
  video.play().catch(()=>{});
  reflectState();

  btn.addEventListener('click', () => {
    video.muted = !video.muted;
    if(!video.muted){ video.play().catch(()=>{ video.muted = true; reflectState(); }); }
    reflectState();
  });
})();
</script>
